<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISUZU Prospectos — Leo Gutierrez</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #CC0000;
    --red-light: #fff0f0;
    --red-dark: #990000;
    --yellow: #f59e0b;
    --yellow-light: #fffbeb;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --gray: #6b7280;
    --gray-light: #f9fafb;
    --border: #e5e7eb;
    --text: #111827;
    --text2: #374151;
    --text3: #6b7280;
    --white: #ffffff;
    --green: #059669;
    --green-light: #ecfdf5;
    --orange: #d97706;
    --orange-light: #fffbeb;
    --purple: #7c3aed;
    --purple-light: #f5f3ff;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; color: var(--text); min-height: 100vh; }

  /* UPLOAD SCREEN */
  #upload-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
  }
  .upload-logo { font-size: 2rem; font-weight: 800; color: var(--red); letter-spacing: -1px; margin-bottom: 0.5rem; }
  .upload-sub { color: var(--gray); font-size: 0.95rem; margin-bottom: 2.5rem; }
  .upload-box {
    border: 2px dashed var(--border); border-radius: 16px; padding: 3rem 2.5rem;
    background: white; cursor: pointer; transition: all 0.2s; max-width: 420px; width: 100%;
  }
  .upload-box:hover { border-color: var(--red); background: var(--red-light); }
  .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
  .upload-box h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .upload-box p { font-size: 0.85rem; color: var(--gray); }
  #file-input { display: none; }
  .upload-btn {
    display: inline-block; margin-top: 1.5rem; padding: 0.75rem 2rem;
    background: var(--red); color: white; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .upload-btn:hover { background: var(--red-dark); }

  /* MAIN APP */
  #app { display: none; }

  /* TOPBAR */
  .topbar {
    background: var(--red); color: white; padding: 0.75rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-logo { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }
  .topbar-count { font-size: 0.8rem; opacity: 0.85; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; }
  .topbar-right { display: flex; gap: 0.5rem; }
  .btn-top {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer;
    font-size: 0.8rem; font-weight: 500; transition: all 0.2s; white-space: nowrap;
  }
  .btn-top:hover { background: rgba(255,255,255,0.25); }
  .btn-top.export { background: white; color: var(--red); font-weight: 600; }
  .btn-top.export:hover { background: #f8f8f8; }

  /* PROGRESS BAR */
  .progress-bar-wrap { background: var(--red-dark); height: 4px; }
  .progress-bar-fill { background: white; height: 4px; transition: width 0.3s; }

  /* CARD AREA */
  .card-area { max-width: 680px; margin: 0 auto; padding: 1.25rem 1rem 6rem; }

  /* PROSPECT CARD */
  .card {
    background: white; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden; margin-bottom: 1rem;
  }
  .card-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
  }
  .card-header-left { flex: 1; min-width: 0; }
  .card-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .badge {
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-urgente { background: #fee2e2; color: #991b1b; }
  .badge-emergente { background: #fef3c7; color: #92400e; }
  .badge-amplia { background: #e0e7ff; color: #3730a3; }
  .badge-score { background: var(--gray-light); color: var(--text2); }
  .card-empresa { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; line-height: 1.3; }
  .card-contacto { font-size: 0.9rem; color: var(--text2); }
  .card-cargo { font-size: 0.8rem; color: var(--gray); }

  /* STATUS indicator */
  .status-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .status-dot.pendiente { background: #d1d5db; }
  .status-dot.contactado { background: #10b981; }
  .status-dot.no-contesto { background: #f59e0b; }
  .status-dot.cita { background: #2563eb; }
  .status-dot.no-interesa { background: #ef4444; }

  /* CARD BODY */
  .card-body { padding: 0.75rem 1.25rem; }
  .info-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
  .info-item { font-size: 0.8rem; color: var(--gray); display: flex; align-items: center; gap: 0.3rem; }
  .info-item a { color: var(--blue); text-decoration: none; }
  .info-item a:hover { text-decoration: underline; }

  .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray); margin-bottom: 0.3rem; margin-top: 0.7rem; }
  .senales-text { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }
  .insights-text { font-size: 0.82rem; color: var(--text2); line-height: 1.6; background: #f0fdf4; padding: 0.5rem 0.75rem; border-radius: 8px; border-left: 3px solid var(--green); }
  .estrategia-text { font-size: 0.82rem; color: var(--text2); line-height: 1.6; background: var(--blue-light); padding: 0.5rem 0.75rem; border-radius: 8px; border-left: 3px solid var(--blue); }

  /* ACTION AREA */
  .card-actions { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); background: var(--gray-light); }

  /* Previous result badge */
  .prev-result {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.78rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 0.6rem;
  }
  .prev-result.contactado { background: #d1fae5; color: #065f46; }
  .prev-result.no-contesto { background: #fef3c7; color: #92400e; }
  .prev-result.cita { background: #dbeafe; color: #1e40af; }
  .prev-result.no-interesa { background: #fee2e2; color: #991b1b; }

  .prev-nota { font-size: 0.8rem; color: var(--text2); background: white; padding: 0.4rem 0.7rem; border-radius: 8px; margin-bottom: 0.6rem; border: 1px solid var(--border); }
  .prev-fecha { font-size: 0.75rem; color: var(--gray); margin-bottom: 0.75rem; }

  .action-label { font-size: 0.75rem; font-weight: 600; color: var(--gray); margin-bottom: 0.5rem; }
  .result-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .result-btn {
    padding: 0.4rem 0.85rem; border-radius: 8px; border: 1.5px solid var(--border);
    background: white; font-size: 0.78rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s; color: var(--text2);
  }
  .result-btn:hover { border-color: var(--red); color: var(--red); }
  .result-btn.active-contactado { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .result-btn.active-no-contesto { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
  .result-btn.active-cita { background: #dbeafe; border-color: var(--blue); color: #1e40af; }
  .result-btn.active-no-interesa { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

  .nota-input {
    width: 100%; padding: 0.5rem 0.75rem; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.82rem; font-family: inherit; resize: none;
    margin-bottom: 0.6rem; transition: border-color 0.2s;
  }
  .nota-input:focus { outline: none; border-color: var(--red); }

  .fecha-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .fecha-label { font-size: 0.78rem; color: var(--gray); white-space: nowrap; }
  .fecha-input {
    padding: 0.35rem 0.6rem; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.78rem; font-family: inherit; transition: border-color 0.2s;
  }
  .fecha-input:focus { outline: none; border-color: var(--red); }

  .save-btn {
    width: 100%; padding: 0.65rem; background: var(--red); color: white;
    border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .save-btn:hover { background: var(--red-dark); }
  .save-btn.saved { background: var(--green); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray); }
  .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

  /* FILTERS */
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0.75rem 1rem; background: white; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .filter-btn {
    padding: 0.35rem 0.85rem; border-radius: 20px; border: 1.5px solid var(--border);
    background: white; font-size: 0.78rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; color: var(--text2);
  }
  .filter-btn:hover { border-color: var(--red); }
  .filter-btn.active { background: var(--red); color: white; border-color: var(--red); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #111; color: white; padding: 0.6rem 1.2rem; border-radius: 10px;
    font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 1000; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .topbar { flex-wrap: wrap; gap: 0.5rem; }
    .info-row { gap: 0.75rem; }
    .result-btns { gap: 0.3rem; }
    .result-btn { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
  }
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="upload-logo">🚛 ISUZU</div>
  <div class="upload-sub">Gestión de Prospectos — Leo Gutierrez</div>
  <div class="upload-box" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📊</div>
    <h3>Cargar lista de prospectos</h3>
    <p>Sube tu archivo Excel (.xlsx) para comenzar a prospectar</p>
    <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Seleccionar archivo</button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)">
  <p style="margin-top:1.5rem; font-size:0.8rem; color:#9ca3af;">Tu progreso se guarda automáticamente en este navegador</p>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🚛 ISUZU</span>
      <span class="topbar-count" id="count-display">0 / 0</span>
    </div>
    <div class="topbar-right">
      <button class="btn-top" onclick="showFilter('pendiente')">📋 Pendientes</button>
      <button class="btn-top" onclick="showFilter('todos')">Todos</button>
      <button class="btn-top export" onclick="exportExcel()">⬇ Excel</button>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('urgente', this)">🔴 Urgente</button>
    <button class="filter-btn" onclick="setFilter('emergente', this)">🟡 Emergente</button>
    <button class="filter-btn" onclick="setFilter('amplia', this)">📋 Amplia</button>
    <button class="filter-btn" onclick="setFilter('pendiente', this)">⚪ Pendientes</button>
    <button class="filter-btn" onclick="setFilter('contactado', this)">✅ Contactados</button>
    <button class="filter-btn" onclick="setFilter('cita', this)">📅 Con cita</button>
    <button class="filter-btn" onclick="setFilter('no-contesto', this)">📵 No contestó</button>
    <button class="filter-btn" onclick="setFilter('no-interesa', this)">❌ No interesa</button>
  </div>

  <div class="card-area" id="card-area"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let prospects = [];
let progress = {};
let currentFilter = 'todos';

// ── LOAD FILE ──────────────────────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const sheets = ['🔴 CALIFICADA URGENTE', '🟡 NEGOCIOS EMERGENTES', '📋 LISTA AMPLIA'];
      const listaMap = { '🔴 CALIFICADA URGENTE': 'urgente', '🟡 NEGOCIOS EMERGENTES': 'emergente', '📋 LISTA AMPLIA': 'amplia' };
      let all = [];

      sheets.forEach(sheetName => {
        if (!wb.Sheets[sheetName]) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, defval: '' });
        let headerIdx = -1;
        rows.forEach((r, i) => { if (r.includes('Score')) headerIdx = i; });
        if (headerIdx < 0) return;
        const headers = rows[headerIdx].map(h => String(h).trim());
        const col = h => headers.indexOf(h);
        for (let i = headerIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          const score = parseFloat(r[col('Score')]);
          const empresa = String(r[col('Empresa')] || '').trim();
          if (!empresa || isNaN(score)) continue;
          all.push({
            lista: listaMap[sheetName],
            score,
            empresa,
            industria: r[col('Industria/Giro')] || '',
            empleados: r[col('Empleados')] || '',
            ingresos: r[col('Ingresos Est.')] || '',
            ciudad: r[col('Ciudad')] || '',
            estado: r[col('Estado')] || '',
            web: r[col('Sitio Web')] || '',
            contacto: r[col('Nombre Contacto')] || '',
            cargo: r[col('Cargo')] || '',
            nivel: r[col('Nivel')] || '',
            email: r[col('Email Trabajo')] || '',
            celular: r[col('Celular/Tel. Directo')] || '',
            tel_empresa: r[col('Tel. Empresa')] || '',
            linkedin: r[col('LinkedIn')] || '',
            senales: r[col('Señales de Compra')] || '',
            insights: r[col('Insights ISUZU')] || '',
            estrategia: r[col('Estrategia Contacto')] || '',
            descripcion: r[col('Descripción Empresa')] || '',
          });
        }
      });

      all.sort((a, b) => b.score - a.score);
      prospects = all.map((p, i) => ({ ...p, id: i }));

      // Load saved progress
      try { progress = JSON.parse(localStorage.getItem('isuzu_progress') || '{}'); } catch(e) { progress = {}; }

      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderAll();
      showToast(`✅ ${prospects.length} prospectos cargados`);
    } catch(err) {
      alert('Error al leer el archivo. Asegúrate de subir el Excel correcto.');
      console.error(err);
    }
  };
  reader.readAsBinaryString(file);
}

// ── RENDER ─────────────────────────────────────────────────────────────
function getFiltered() {
  return prospects.filter(p => {
    if (currentFilter === 'todos') return true;
    if (currentFilter === 'urgente') return p.lista === 'urgente';
    if (currentFilter === 'emergente') return p.lista === 'emergente';
    if (currentFilter === 'amplia') return p.lista === 'amplia';
    const pr = progress[p.id];
    const status = pr ? pr.resultado : 'pendiente';
    if (currentFilter === 'pendiente') return !pr || !pr.resultado;
    return status === currentFilter;
  });
}

function renderAll() {
  const filtered = getFiltered();
  const total = prospects.length;
  const done = Object.values(progress).filter(p => p.resultado).length;
  document.getElementById('count-display').textContent = `${done} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? (done/total*100)+'%' : '0%';

  const area = document.getElementById('card-area');
  if (!filtered.length) {
    area.innerHTML = '<div class="empty-state"><h3>Sin prospectos aquí</h3><p>Cambia el filtro para ver más.</p></div>';
    return;
  }
  area.innerHTML = filtered.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const pr = progress[p.id] || {};
  const resultado = pr.resultado || '';
  const nota = pr.nota || '';
  const fecha = pr.fecha || '';

  const listaBadge = p.lista === 'urgente' ? 'badge-urgente' : p.lista === 'emergente' ? 'badge-emergente' : 'badge-amplia';
  const listaLabel = p.lista === 'urgente' ? '🔴 Urgente' : p.lista === 'emergente' ? '🟡 Emergente' : '📋 Amplia';

  const liUrl = p.linkedin ? (p.linkedin.startsWith('http') ? p.linkedin : 'https://' + p.linkedin) : '';
  const webUrl = p.web ? (p.web.startsWith('http') ? p.web : 'https://' + p.web) : '';

  const resultLabels = {
    contactado: '✅ Contactado',
    'no-contesto': '📵 No contestó',
    cita: '📅 Cita agendada',
    'no-interesa': '❌ No interesa'
  };

  const prevResultHtml = resultado ? `
    <div class="prev-result ${resultado}">${resultLabels[resultado] || resultado}</div>
    ${nota ? `<div class="prev-nota">💬 ${escHtml(nota)}</div>` : ''}
    ${fecha ? `<div class="prev-fecha">📅 Seguimiento: ${fecha}</div>` : ''}
  ` : '';

  const makeResultBtn = (key, label) =>
    `<button class="result-btn ${resultado === key ? 'active-' + key : ''}" onclick="selectResult(${p.id}, '${key}')">${label}</button>`;

  return `
  <div class="card" id="card-${p.id}">
    <div class="card-header">
      <div class="card-header-left">
        <div class="card-badges">
          <span class="badge ${listaBadge}">${listaLabel}</span>
          <span class="badge badge-score">Score ${p.score}</span>
          ${p.nivel ? `<span class="badge badge-score">${p.nivel}</span>` : ''}
        </div>
        <div class="card-empresa">${escHtml(p.empresa)}</div>
        ${p.contacto ? `<div class="card-contacto">${escHtml(p.contacto)}</div>` : ''}
        ${p.cargo ? `<div class="card-cargo">${escHtml(p.cargo)}</div>` : ''}
      </div>
      <div class="status-dot ${resultado || 'pendiente'}"></div>
    </div>

    <div class="card-body">
      <div class="info-row">
        ${p.ciudad || p.estado ? `<span class="info-item">📍 ${[p.ciudad, p.estado].filter(Boolean).join(', ')}</span>` : ''}
        ${p.empleados ? `<span class="info-item">👥 ${p.empleados}</span>` : ''}
        ${p.ingresos ? `<span class="info-item">💰 ${p.ingresos}</span>` : ''}
        ${p.email ? `<span class="info-item">✉️ <a href="mailto:${p.email}">${p.email}</a></span>` : ''}
        ${p.celular ? `<span class="info-item">📞 <a href="tel:${p.celular}">${p.celular}</a></span>` : ''}
        ${p.tel_empresa ? `<span class="info-item">☎️ ${p.tel_empresa}</span>` : ''}
        ${webUrl ? `<span class="info-item">🌐 <a href="${webUrl}" target="_blank">${p.web}</a></span>` : ''}
        ${liUrl ? `<span class="info-item">🔗 <a href="${liUrl}" target="_blank">LinkedIn</a></span>` : ''}
      </div>
      ${p.senales ? `<div class="section-label">Señales de compra</div><div class="senales-text">${escHtml(p.senales)}</div>` : ''}
      ${p.insights ? `<div class="section-label">Propuesta ISUZU</div><div class="insights-text">${escHtml(p.insights)}</div>` : ''}
      ${p.estrategia ? `<div class="section-label">Estrategia de contacto</div><div class="estrategia-text">${escHtml(p.estrategia)}</div>` : ''}
      ${p.descripcion ? `<div class="section-label">Sobre la empresa</div><div class="senales-text">${escHtml(p.descripcion.substring(0, 200))}${p.descripcion.length > 200 ? '...' : ''}</div>` : ''}
    </div>

    <div class="card-actions">
      ${prevResultHtml}
      <div class="action-label">Registrar resultado:</div>
      <div class="result-btns">
        ${makeResultBtn('contactado', '✅ Contactado')}
        ${makeResultBtn('no-contesto', '📵 No contestó')}
        ${makeResultBtn('cita', '📅 Cita agendada')}
        ${makeResultBtn('no-interesa', '❌ No interesa')}
      </div>
      <textarea class="nota-input" id="nota-${p.id}" rows="2" placeholder="Nota rápida: qué pasó, qué dijo, próximo paso...">${escHtml(nota)}</textarea>
      <div class="fecha-row">
        <span class="fecha-label">📅 Fecha de seguimiento:</span>
        <input type="date" class="fecha-input" id="fecha-${p.id}" value="${fecha}">
      </div>
      <button class="save-btn" id="save-btn-${p.id}" onclick="saveProgress(${p.id})">Guardar y continuar →</button>
    </div>
  </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── INTERACTIONS ───────────────────────────────────────────────────────
function selectResult(id, resultado) {
  if (!progress[id]) progress[id] = {};
  progress[id].resultado = resultado;
  saveLocal();
  // Update buttons in DOM
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.querySelectorAll('.result-btn').forEach(btn => {
    btn.className = 'result-btn';
  });
  const resultKeys = ['contactado','no-contesto','cita','no-interesa'];
  card.querySelectorAll('.result-btn').forEach((btn, i) => {
    if (resultKeys[i] === resultado) btn.classList.add('active-' + resultado);
  });
  // Update status dot
  const dot = card.querySelector('.status-dot');
  if (dot) { dot.className = 'status-dot ' + resultado; }
  updateTopbar();
}

function saveProgress(id) {
  const nota = document.getElementById('nota-' + id)?.value || '';
  const fecha = document.getElementById('fecha-' + id)?.value || '';
  const resultado = progress[id]?.resultado || '';
  if (!progress[id]) progress[id] = {};
  progress[id] = { resultado, nota, fecha };
  saveLocal();
  updateTopbar();
  const btn = document.getElementById('save-btn-' + id);
  if (btn) {
    btn.textContent = '✓ Guardado';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = 'Guardar y continuar →';
      btn.classList.remove('saved');
      if (currentFilter !== 'todos') renderAll();
    }, 1200);
  }
  showToast('Guardado ✓');
}

function saveLocal() {
  try { localStorage.setItem('isuzu_progress', JSON.stringify(progress)); } catch(e) {}
}

function updateTopbar() {
  const total = prospects.length;
  const done = Object.values(progress).filter(p => p.resultado).length;
  document.getElementById('count-display').textContent = `${done} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? (done/total*100)+'%' : '0%';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
}

function showFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(f) || (f === 'todos' && b.textContent === 'Todos'));
  });
  renderAll();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── EXPORT EXCEL ───────────────────────────────────────────────────────
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const resultLabels = { contactado: 'Contactado', 'no-contesto': 'No contestó', cita: 'Cita agendada', 'no-interesa': 'No interesa', '': 'Pendiente' };

  const rows = prospects.map(p => {
    const pr = progress[p.id] || {};
    return {
      'Score': p.score,
      'Lista': p.lista === 'urgente' ? 'Urgente' : p.lista === 'emergente' ? 'Emergente' : 'Amplia',
      'Empresa': p.empresa,
      'Contacto': p.contacto,
      'Cargo': p.cargo,
      'Nivel': p.nivel,
      'Ciudad': p.ciudad,
      'Estado': p.estado,
      'Email': p.email,
      'Celular': p.celular,
      'Tel. Empresa': p.tel_empresa,
      'LinkedIn': p.linkedin,
      'Sitio Web': p.web,
      'Empleados': p.empleados,
      'Ingresos Est.': p.ingresos,
      'Señales de Compra': p.senales,
      'Insights ISUZU': p.insights,
      'Estrategia': p.estrategia,
      '--- PROGRESO ---': '',
      'Resultado': resultLabels[pr.resultado || ''],
      'Nota': pr.nota || '',
      'Fecha Seguimiento': pr.fecha || '',
    };
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: Math.min(40, Math.max(10, k.length + 4)) }));
  XLSX.utils.book_append_sheet(wb, ws, 'Prospectos ISUZU');
  XLSX.writeFile(wb, `ISUZU_Prospectos_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('Excel exportado ✓');
}
