<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISUZU Prospectos — Leo Gutierrez</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #CC0000; --red-dark: #990000; --red-light: #fff0f0;
  --green: #059669; --green-light: #ecfdf5;
  --blue: #2563eb; --blue-light: #eff6ff;
  --yellow: #d97706; --yellow-light: #fffbeb;
  --purple: #7c3aed; --purple-light: #f5f3ff;
  --gray: #6b7280; --gray-light: #f9fafb;
  --border: #e5e7eb; --text: #111827; --text2: #374151; --text3: #9ca3af;
  --white: #ffffff;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; color: var(--text); min-height: 100vh; }

/* ── UPLOAD ── */
#upload-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem; text-align: center;
}
.upload-logo { font-size: 2.2rem; font-weight: 800; color: var(--red); margin-bottom: 0.25rem; }
.upload-sub { color: var(--gray); font-size: 0.9rem; margin-bottom: 2.5rem; }
.upload-box {
  border: 2px dashed var(--border); border-radius: 20px; padding: 3rem 2.5rem;
  background: white; cursor: pointer; max-width: 400px; width: 100%;
  transition: all 0.2s;
}
.upload-box:hover { border-color: var(--red); background: var(--red-light); }
.upload-icon { font-size: 3rem; margin-bottom: 1rem; }
.upload-box h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
.upload-box p { font-size: 0.82rem; color: var(--gray); }
.upload-btn {
  display: inline-block; margin-top: 1.5rem; padding: 0.7rem 2rem;
  background: var(--red); color: white; border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
}
.upload-btn:hover { background: var(--red-dark); }
#file-input { display: none; }

/* ── APP ── */
#app { display: none; min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  background: var(--red); color: white; padding: 0.7rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { font-weight: 800; font-size: 1.1rem; }
.topbar-center { font-size: 0.82rem; opacity: 0.9; text-align: center; }
.topbar-right { display: flex; gap: 0.4rem; }
.btn-sm {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 0.35rem 0.75rem; border-radius: 8px; cursor: pointer;
  font-size: 0.75rem; font-weight: 500; transition: all 0.15s; white-space: nowrap;
}
.btn-sm:hover { background: rgba(255,255,255,0.28); }
.btn-sm.export { background: white; color: var(--red); font-weight: 700; }

/* ── PROGRESS ── */
.progress-wrap { height: 5px; background: var(--red-dark); }
.progress-fill { height: 5px; background: white; transition: width 0.4s ease; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 0.4rem; padding: 0.6rem 1rem; background: white;
  border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.fbtn {
  padding: 0.3rem 0.8rem; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-size: 0.75rem; font-weight: 500; cursor: pointer;
  white-space: nowrap; color: var(--text2); transition: all 0.15s;
}
.fbtn:hover { border-color: var(--red); }
.fbtn.active { background: var(--red); color: white; border-color: var(--red); }

/* ── MAIN STAGE ── */
.stage {
  max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem 2rem;
  display: flex; flex-direction: column; gap: 1rem;
}

/* ── CARD ── */
.card {
  background: white; border-radius: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.card-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
.badge {
  font-size: 0.68rem; font-weight: 700; padding: 2px 9px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.b-urgente   { background: #fee2e2; color: #991b1b; }
.b-emergente { background: #fef3c7; color: #92400e; }
.b-amplia    { background: #e0e7ff; color: #3730a3; }
.b-score     { background: var(--gray-light); color: var(--text2); }
.b-nivel     { background: #f0fdf4; color: #065f46; }

.card-empresa  { font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.2rem; }
.card-contacto { font-size: 0.92rem; font-weight: 600; color: var(--text2); }
.card-cargo    { font-size: 0.78rem; color: var(--gray); margin-top: 0.1rem; }

.card-meta { display: flex; gap: 1rem; flex-wrap: wrap; padding: 0.6rem 1.25rem; border-bottom: 1px solid var(--border); }
.meta-item { font-size: 0.78rem; color: var(--gray); display: flex; align-items: center; gap: 0.25rem; }

/* ── CONTACT BUTTONS ── */
.contact-section { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); }
.contact-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray); margin-bottom: 0.5rem; }
.contact-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.cbtn {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.55rem 1rem; border-radius: 10px; border: none;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: all 0.15s; white-space: nowrap;
}
.cbtn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
.cbtn.whatsapp    { background: #25d366; color: white; }
.cbtn.llamar      { background: #4b5563; color: white; }
.cbtn.tel-empresa { background: var(--purple-light); color: var(--purple); }
.cbtn.email       { background: #ea4335; color: white; }
.cbtn.linkedin    { background: #0077b5; color: white; }
.cbtn.web         { background: var(--gray-light); color: var(--text2); border: 1px solid var(--border); }
.no-contact { font-size: 0.78rem; color: var(--text3); font-style: italic; }

/* ── INSIGHTS ── */
.insights-section { padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); }
.sec-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray); margin-bottom: 0.35rem; margin-top: 0.65rem; }
.sec-label:first-child { margin-top: 0; }
.senales-text  { font-size: 0.8rem; color: var(--text2); line-height: 1.65; }
.insights-box  { font-size: 0.8rem; color: var(--text2); line-height: 1.65; background: var(--green-light); padding: 0.5rem 0.75rem; border-radius: 8px; border-left: 3px solid var(--green); }
.estrategia-box{ font-size: 0.8rem; color: var(--text2); line-height: 1.65; background: var(--blue-light); padding: 0.5rem 0.75rem; border-radius: 8px; border-left: 3px solid var(--blue); }

/* ── ACTION SECTION ── */
.action-section { padding: 0.85rem 1.25rem; background: var(--gray-light); }

.prev-result-wrap { margin-bottom: 0.65rem; }
.prev-badge {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-size: 0.78rem; font-weight: 600; padding: 3px 11px; border-radius: 20px;
}
.pr-contactado  { background: #d1fae5; color: #065f46; }
.pr-no-contesto { background: #fef3c7; color: #92400e; }
.pr-cita        { background: #dbeafe; color: #1e40af; }
.pr-no-interesa { background: #fee2e2; color: #991b1b; }
.prev-nota { font-size: 0.78rem; color: var(--text2); margin-top: 0.3rem; background: white; padding: 0.35rem 0.65rem; border-radius: 8px; border: 1px solid var(--border); }
.prev-fecha { font-size: 0.72rem; color: var(--gray); margin-top: 0.25rem; }

.action-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray); margin-bottom: 0.45rem; }
.result-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.65rem; }
.rbtn {
  padding: 0.45rem 0.9rem; border-radius: 9px; border: 1.5px solid var(--border);
  background: white; font-size: 0.78rem; font-weight: 500; cursor: pointer;
  transition: all 0.15s; color: var(--text2);
}
.rbtn:hover { border-color: var(--red); color: var(--red); }
.rbtn.sel-contactado  { background: #d1fae5; border-color: #10b981; color: #065f46; }
.rbtn.sel-no-contesto { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.rbtn.sel-cita        { background: #dbeafe; border-color: var(--blue); color: #1e40af; }
.rbtn.sel-no-interesa { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

.nota-input {
  width: 100%; padding: 0.5rem 0.75rem; border: 1.5px solid var(--border);
  border-radius: 9px; font-size: 0.82rem; font-family: inherit; resize: none;
  margin-bottom: 0.55rem; transition: border-color 0.2s; background: white;
}
.nota-input:focus { outline: none; border-color: var(--red); }

.fecha-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
.fecha-lbl { font-size: 0.75rem; color: var(--gray); white-space: nowrap; }
.fecha-input {
  padding: 0.32rem 0.6rem; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.78rem; font-family: inherit;
}
.fecha-input:focus { outline: none; border-color: var(--red); }

/* NEXT BUTTON — the main CTA */
.next-btn {
  width: 100%; padding: 0.8rem; border: none; border-radius: 12px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  background: var(--red); color: white; letter-spacing: 0.01em;
}
.next-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
.next-btn:active { transform: translateY(0); }
.next-btn.done { background: var(--green); }

/* ── EMPTY / DONE ── */
.done-screen {
  text-align: center; padding: 3rem 1.5rem;
  background: white; border-radius: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.done-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.done-screen h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
.done-screen p { font-size: 0.88rem; color: var(--gray); margin-bottom: 1.5rem; }
.done-btn {
  padding: 0.65rem 1.5rem; background: var(--red); color: white;
  border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; margin: 0.3rem;
}
.done-btn:hover { background: var(--red-dark); }
.done-btn.sec { background: white; color: var(--text2); border: 1.5px solid var(--border); }

/* ── COUNTER CHIP ── */
.counter-chip {
  display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; font-size: 0.8rem; color: var(--gray);
  background: white; border-radius: 20px; padding: 0.4rem 1rem;
  border: 1px solid var(--border); align-self: center;
}
.chip-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: #111; color: white; padding: 0.55rem 1.2rem; border-radius: 10px;
  font-size: 0.82rem; font-weight: 500; opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }

@media (max-width: 480px) {
  .topbar-center { display: none; }
  .cbtn { font-size: 0.75rem; padding: 0.45rem 0.8rem; }
  .rbtn { font-size: 0.73rem; padding: 0.4rem 0.75rem; }
}
</style>
</head>
<body>

<!-- UPLOAD -->
<div id="upload-screen">
  <div class="upload-logo">🚛 ISUZU</div>
  <div class="upload-sub">Gestión de Prospectos — Leo Gutierrez</div>
  <div class="upload-box" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📊</div>
    <h3>Cargar lista de prospectos</h3>
    <p>Sube tu Excel (.xlsx) y arranca a prospectar</p>
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">Seleccionar archivo</button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)">
  <p style="margin-top:1.2rem;font-size:0.75rem;color:#9ca3af;">Tu progreso se guarda automáticamente</p>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">🚛 ISUZU</span>
    <span class="topbar-center" id="topbar-info">—</span>
    <div class="topbar-right">
      <button class="btn-sm export" onclick="exportExcel()">⬇ Excel</button>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="prog-bar"></div></div>

  <div class="filter-bar" id="filter-bar">
    <button class="fbtn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="fbtn" onclick="setFilter('urgente',this)">🔴 Urgente</button>
    <button class="fbtn" onclick="setFilter('emergente',this)">🟡 Emergente</button>
    <button class="fbtn" onclick="setFilter('amplia',this)">📋 Amplia</button>
    <button class="fbtn" onclick="setFilter('pendiente',this)">⚪ Pendientes</button>
    <button class="fbtn" onclick="setFilter('contactado',this)">✅ Contactados</button>
    <button class="fbtn" onclick="setFilter('cita',this)">📅 Con cita</button>
    <button class="fbtn" onclick="setFilter('no-contesto',this)">📵 No contestó</button>
    <button class="fbtn" onclick="setFilter('no-interesa',this)">❌ No interesa</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let prospects = [];
let progress  = {};
let queue     = [];   // filtered + ordered indices into prospects[]
let qIdx      = 0;    // current position in queue
let curFilter = 'todos';
let curResult = '';   // selected result for current card

// ── FILE LOAD ─────────────────────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const sheetMap = {
        '🔴 CALIFICADA URGENTE': 'urgente',
        '🟡 NEGOCIOS EMERGENTES': 'emergente',
        '📋 LISTA AMPLIA': 'amplia'
      };
      let all = [];
      Object.entries(sheetMap).forEach(([sName, lista]) => {
        if (!wb.Sheets[sName]) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sName], { header: 1, defval: '' });
        let hi = -1;
        rows.forEach((r, i) => { if (r.includes('Score')) hi = i; });
        if (hi < 0) return;
        const h = rows[hi].map(v => String(v).trim());
        const c = k => h.indexOf(k);
        for (let i = hi + 1; i < rows.length; i++) {
          const r = rows[i];
          const score = parseFloat(r[c('Score')]);
          const empresa = String(r[c('Empresa')] || '').trim();
          if (!empresa || isNaN(score)) continue;
          all.push({
            lista, score, empresa,
            industria:   r[c('Industria/Giro')]     || '',
            empleados:   r[c('Empleados')]           || '',
            ingresos:    r[c('Ingresos Est.')]       || '',
            ciudad:      r[c('Ciudad')]              || '',
            estado:      r[c('Estado')]              || '',
            web:         r[c('Sitio Web')]           || '',
            contacto:    r[c('Nombre Contacto')]     || '',
            cargo:       r[c('Cargo')]               || '',
            nivel:       r[c('Nivel')]               || '',
            email:       r[c('Email Trabajo')]       || '',
            celular:     r[c('Celular/Tel. Directo')]|| '',
            tel_empresa: r[c('Tel. Empresa')]        || '',
            linkedin:    r[c('LinkedIn')]            || '',
            senales:     r[c('Señales de Compra')]   || '',
            insights:    r[c('Insights ISUZU')]      || '',
            estrategia:  r[c('Estrategia Contacto')] || '',
            descripcion: r[c('Descripción Empresa')] || '',
          });
        }
      });
      all.sort((a, b) => b.score - a.score);
      prospects = all.map((p, i) => ({ ...p, id: i }));
      try { progress = JSON.parse(localStorage.getItem('isuzu_v2') || '{}'); } catch { progress = {}; }
      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      buildQueue();
      showToast(`✅ ${prospects.length} prospectos cargados`);
    } catch(err) {
      alert('Error al leer el archivo.');
      console.error(err);
    }
  };
  reader.readAsBinaryString(file);
}

// ── QUEUE ─────────────────────────────────────────────────────────────
function buildQueue() {
  queue = prospects
    .filter(p => {
      if (curFilter === 'todos') return true;
      if (['urgente','emergente','amplia'].includes(curFilter)) return p.lista === curFilter;
      const r = (progress[p.id] || {}).resultado || '';
      if (curFilter === 'pendiente') return !r;
      return r === curFilter;
    })
    .map(p => p.id);
  qIdx = 0;
  renderStage();
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  buildQueue();
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderStage() {
  updateTopbar();
  const stage = document.getElementById('stage');

  if (!queue.length) {
    stage.innerHTML = `
      <div class="done-screen">
        <div class="done-icon">🎉</div>
        <h2>Sin prospectos aquí</h2>
        <p>Cambia el filtro para ver más contactos.</p>
        <button class="done-btn sec" onclick="setFilter('todos', document.querySelector('.fbtn'))">Ver todos</button>
      </div>`;
    return;
  }

  if (qIdx >= queue.length) {
    const done  = queue.filter(id => (progress[id]||{}).resultado).length;
    stage.innerHTML = `
      <div class="done-screen">
        <div class="done-icon">🏁</div>
        <h2>¡Lista completada!</h2>
        <p>Trabajaste ${done} de ${queue.length} prospectos en esta sesión.</p>
        <button class="done-btn" onclick="exportExcel()">⬇ Exportar Excel</button>
        <button class="done-btn sec" onclick="qIdx=0;renderStage()">Volver al inicio</button>
      </div>`;
    return;
  }

  const p  = prospects[queue[qIdx]];
  const pr = progress[p.id] || {};
  curResult = pr.resultado || '';

  const listaClass = { urgente:'b-urgente', emergente:'b-emergente', amplia:'b-amplia' }[p.lista];
  const listaLabel = { urgente:'🔴 Urgente', emergente:'🟡 Emergente', amplia:'📋 Amplia' }[p.lista];
  const liUrl  = p.linkedin ? (p.linkedin.startsWith('http') ? p.linkedin : 'https://' + p.linkedin) : '';
  const webUrl = p.web      ? (p.web.startsWith('http')      ? p.web      : 'https://' + p.web)      : '';
  const waNum  = p.celular  ? p.celular.replace(/[^0-9]/g,'') : '';

  const rl = { contactado:'✅ Contactado', 'no-contesto':'📵 No contestó', cita:'📅 Cita agendada', 'no-interesa':'❌ No interesa' };
  const prevHtml = curResult ? `
    <div class="prev-result-wrap">
      <span class="prev-badge pr-${curResult}">${rl[curResult]}</span>
      ${pr.nota  ? `<div class="prev-nota">💬 ${esc(pr.nota)}</div>` : ''}
      ${pr.fecha ? `<div class="prev-fecha">📅 Seguimiento: ${pr.fecha}</div>` : ''}
    </div>` : '';

  const rb = (key, label) =>
    `<button class="rbtn${curResult===key?' sel-'+key:''}" onclick="pickResult('${key}')">${label}</button>`;

  const done  = Object.values(progress).filter(x => x.resultado).length;
  const total = prospects.length;

  stage.innerHTML = `
    <div class="counter-chip">
      <span class="chip-dot" style="background:${curFilter==='urgente'?'#ef4444':curFilter==='emergente'?'#f59e0b':curFilter==='amplia'?'#6366f1':'#9ca3af'}"></span>
      Prospecto ${qIdx + 1} de ${queue.length}
      &nbsp;·&nbsp; ${done} completados de ${total}
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-badges">
          <span class="badge ${listaClass}">${listaLabel}</span>
          <span class="badge b-score">Score ${p.score}</span>
          ${p.nivel ? `<span class="badge b-nivel">${p.nivel}</span>` : ''}
        </div>
        <div class="card-empresa">${esc(p.empresa)}</div>
        ${p.contacto ? `<div class="card-contacto">${esc(p.contacto)}</div>` : ''}
        ${p.cargo    ? `<div class="card-cargo">${esc(p.cargo)}</div>`       : ''}
      </div>

      ${p.ciudad||p.estado||p.empleados||p.ingresos||p.industria ? `
      <div class="card-meta">
        ${p.ciudad||p.estado ? `<span class="meta-item">📍 ${[p.ciudad,p.estado].filter(Boolean).join(', ')}</span>` : ''}
        ${p.empleados        ? `<span class="meta-item">👥 ${p.empleados}</span>`  : ''}
        ${p.ingresos         ? `<span class="meta-item">💰 ${p.ingresos}</span>`   : ''}
        ${p.industria        ? `<span class="meta-item">🏭 ${p.industria}</span>`  : ''}
      </div>` : ''}

      <div class="contact-section">
        <div class="contact-label">Contactar ahora</div>
        <div class="contact-btns">
          ${waNum  ? `<a class="cbtn whatsapp"    href="https://wa.me/${waNum}" target="_blank">💬 WhatsApp</a>` : ''}
          ${p.celular      ? `<a class="cbtn llamar"      href="tel:${p.celular}" >📞 ${p.celular}</a>` : ''}
          ${p.tel_empresa  ? `<a class="cbtn tel-empresa" href="tel:${p.tel_empresa}">☎️ ${p.tel_empresa}</a>` : ''}
          ${p.email        ? `<a class="cbtn email"       href="mailto:${p.email}" target="_blank">✉️ Email</a>` : ''}
          ${liUrl          ? `<a class="cbtn linkedin"    href="${liUrl}"  target="_blank">in LinkedIn</a>` : ''}
          ${webUrl         ? `<a class="cbtn web"         href="${webUrl}" target="_blank">🌐 Web</a>` : ''}
          ${!waNum&&!p.celular&&!p.tel_empresa&&!p.email&&!liUrl
            ? `<span class="no-contact">Sin contacto directo — usa LinkedIn o Web</span>` : ''}
        </div>
      </div>

      <div class="insights-section">
        ${p.senales   ? `<div class="sec-label">Señales de compra</div><div class="senales-text">${esc(p.senales)}</div>`     : ''}
        ${p.insights  ? `<div class="sec-label">Propuesta ISUZU</div><div class="insights-box">${esc(p.insights)}</div>`      : ''}
        ${p.estrategia? `<div class="sec-label">Estrategia</div><div class="estrategia-box">${esc(p.estrategia)}</div>`       : ''}
        ${p.descripcion?`<div class="sec-label">Empresa</div><div class="senales-text">${esc(p.descripcion.slice(0,180))}${p.descripcion.length>180?'…':''}</div>` : ''}
      </div>

      <div class="action-section">
        ${prevHtml}
        <div class="action-label">¿Qué pasó?</div>
        <div class="result-btns">
          ${rb('contactado','✅ Contactado')}
          ${rb('no-contesto','📵 No contestó')}
          ${rb('cita','📅 Cita agendada')}
          ${rb('no-interesa','❌ No interesa')}
        </div>
        <textarea class="nota-input" id="nota-field" rows="2"
          placeholder="Nota: qué dijo, próximo paso, detalle...">${esc(pr.nota||'')}</textarea>
        <div class="fecha-row">
          <span class="fecha-lbl">📅 Seguimiento:</span>
          <input type="date" class="fecha-input" id="fecha-field" value="${pr.fecha||''}">
        </div>
        <button class="next-btn" id="next-btn" onclick="saveAndNext()">
          ${qIdx < queue.length - 1 ? 'Guardar y siguiente →' : 'Guardar y finalizar ✓'}
        </button>
      </div>
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────
function pickResult(key) {
  curResult = key;
  document.querySelectorAll('.rbtn').forEach(b => {
    b.className = 'rbtn' + (b.textContent.toLowerCase().includes(key.replace('-',' ')) ? ' sel-'+key : '');
  });
  // re-apply all
  const map = { contactado:'✅ Contactado', 'no-contesto':'📵 No contestó', cita:'📅 Cita agendada', 'no-interesa':'❌ No interesa' };
  document.querySelectorAll('.rbtn').forEach(b => {
    const k = Object.keys(map).find(k => b.textContent.trim() === map[k]);
    b.className = 'rbtn' + (k === key ? ' sel-'+key : '');
  });
}

function saveAndNext() {
  const p    = prospects[queue[qIdx]];
  const nota = document.getElementById('nota-field')?.value  || '';
  const fecha= document.getElementById('fecha-field')?.value || '';
  progress[p.id] = { resultado: curResult, nota, fecha };
  saveLocal();
  showToast(curResult ? '✓ Guardado' : '→ Siguiente');
  qIdx++;
  curResult = '';
  renderStage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveLocal() {
  try { localStorage.setItem('isuzu_v2', JSON.stringify(progress)); } catch {}
}

function updateTopbar() {
  const done  = Object.values(progress).filter(x => x.resultado).length;
  const total = prospects.length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('topbar-info').textContent = `${done}/${total} completados (${pct}%)`;
  document.getElementById('prog-bar').style.width = pct + '%';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── EXPORT ────────────────────────────────────────────────────────────
function exportExcel() {
  const rl = { contactado:'Contactado', 'no-contesto':'No contestó', cita:'Cita agendada', 'no-interesa':'No interesa', '':'Pendiente' };
  const rows = prospects.map(p => {
    const pr = progress[p.id] || {};
    return {
      'Score': p.score,
      'Lista': { urgente:'Urgente', emergente:'Emergente', amplia:'Amplia' }[p.lista],
      'Empresa': p.empresa, 'Contacto': p.contacto, 'Cargo': p.cargo,
      'Nivel': p.nivel, 'Ciudad': p.ciudad, 'Estado': p.estado,
      'Email': p.email, 'Celular': p.celular, 'Tel. Empresa': p.tel_empresa,
      'LinkedIn': p.linkedin, 'Sitio Web': p.web,
      'Empleados': p.empleados, 'Ingresos Est.': p.ingresos,
      'Industria': p.industria,
      'Señales de Compra': p.senales, 'Insights ISUZU': p.insights,
      'Estrategia': p.estrategia,
      '— PROGRESO —': '',
      'Resultado': rl[pr.resultado||''],
      'Nota': pr.nota || '',
      'Fecha Seguimiento': pr.fecha || '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: Math.min(45, Math.max(10, k.length + 4)) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Prospectos ISUZU');
  XLSX.writeFile(wb, `ISUZU_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('Excel exportado ✓');
}
</script>
</body>
</html>
